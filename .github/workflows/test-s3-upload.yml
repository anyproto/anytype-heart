name: Build and Upload to S3

on:
  workflow_dispatch:
  push:
    branches:
      - nightly-ci-test

jobs:
  build:
    runs-on: macos-12

    steps:
      - name: Install AWS CLI
        run: |
          #brew install awscli
          aws --version  # check version AWS CLI

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.NIGHTLY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NIGHTLY_AWS_SECRET_ACCESS_KEY }}
          aws-region: 'eu-central-1'

      - name: Upload build artifacts to S3
        run: |
          echo testbytest > ./testfile
          aws s3 cp ./testfile s3://${{ secrets.NIGHTLY_AWS_S3_BUCKET }}/

